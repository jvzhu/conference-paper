name: Build LaTeX Paper

permissions:
  contents: read
  actions: write

on:
  push:
    branches: ["**"]
    paths:
      - "paper.tex"
      - "references.bib"
      - "figures/**"
  pull_request:
    paths:
      - "paper.tex"
      - "references.bib"
      - "figures/**"

jobs:
  build:
    name: Compile manuscript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper.pdf
          retention-days: 30
